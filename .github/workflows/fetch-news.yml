name: Fetch Web-3D News

on:
  schedule:
    - cron: '0 23,1,3,5,7,9,11,13,15 * * *'  # mỗi 2 tiếng, 08:00–22:00 UTC+7
  workflow_dispatch:        # trigger thủ công để test

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch news
        run: node scripts/fetch-news.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/index.md
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update news $(date -u '+%Y-%m-%d')"
            git push
          fi
