name: Sync Docs from Source Repos

on:
  repository_dispatch:
    types: [sync-docs]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout web3d-docs
        uses: actions/checkout@v4
        with:
          path: docs

      - name: Checkout Private-threejs
        uses: actions/checkout@v4
        with:
          repository: Web-3D/Private-threejs
          path: threejs

      - name: Checkout Web-3D-Ecosystem
        uses: actions/checkout@v4
        with:
          repository: Web-3D/Web-3D-Ecosystem
          path: web3d

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run sync
        working-directory: docs
        env:
          WEB3D_PATH:   ${{ github.workspace }}/web3d
          THREEJS_PATH: ${{ github.workspace }}/threejs
          BABYLON_PATH: ${{ github.workspace }}/web3d/BABYLONJS
          DOCS_PATH:    ${{ github.workspace }}/docs
        run: node sync.js

      - name: Commit & push if changed
        working-directory: docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "docs: auto-sync $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          fi
